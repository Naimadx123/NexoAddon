# Telekinesis Mechanic - Example Configuration

# The Telekinesis mechanic makes broken blocks drop directly into the player's inventory
# instead of dropping on the ground. This works with any tool that has this mechanic enabled.
# It can be combined with other mechanics like BigMining, VeinMiner, Timber, etc.

# --- WHITELIST ---
# You can restrict Telekinesis to specific blocks using "materials" and/or "nexo_ids".
# If both lists are empty (or not specified), Telekinesis applies to ALL broken blocks.
# This is especially useful when combined with BigMining/VeinMiner to prevent
# non-allowlisted blocks in the radius from ending up in the inventory.

# Example: Telekinesis only for stone
diamond_pickaxe_telekinesis:
  material: DIAMOND_PICKAXE
  Mechanics:
    telekinesis:
      enabled: true
      materials:          # Only these vanilla block types trigger Telekinesis
        - STONE
        - COBBLESTONE
      nexo_ids: []        # Leave empty if no Nexo custom blocks needed

# Example BigMining + Telekinesis with matching whitelist:
# Both BigMining and Telekinesis have the same whitelist → only stone is affected
super_pickaxe:
  material: NETHERITE_PICKAXE
  Mechanics:
    bigmining:
      radius: 1
      depth: 1
      switchable: true
      whitelist:
        - STONE
        - COBBLESTONE
    telekinesis:
      enabled: true
      materials:          # Must match BigMining whitelist to avoid duplicates
        - STONE
        - COBBLESTONE
      nexo_ids: []

# Example Iron Pickaxe with Telekinesis AND VeinMiner:
iron_pickaxe_multi:
  material: IRON_PICKAXE
  Mechanics:
    telekinesis:
      enabled: true
      materials:
        - IRON_ORE
        - DEEPSLATE_IRON_ORE
      nexo_ids:
        - nexo_custom_ore   # Custom Nexo block ID
    veinminer:
      distance: 15
      toggleable: true
      same_material: true
      limit: 64
      whitelist:
        - IRON_ORE
        - DEEPSLATE_IRON_ORE
        - nexo_custom_ore

# Example Axe with Telekinesis AND Timber:
super_axe:
  material: NETHERITE_AXE
  Mechanics:
    telekinesis:
      enabled: true
      materials: []       # Empty = all blocks (logs from Timber all go to inventory)
      nexo_ids: []
    timber:
      limit: 200
      max_height: 50
      toggleable: true
      break_leaves: true
      whitelist: []

# Example Shovel with Telekinesis AND BigMining:
super_shovel:
  material: DIAMOND_SHOVEL
  Mechanics:
    telekinesis:
      enabled: true
      materials:
        - DIRT
        - SAND
        - GRAVEL
      nexo_ids: []
    bigmining:
      radius: 1
      depth: 1
      switchable: true
      whitelist:
        - DIRT
        - SAND
        - GRAVEL

# How it works:
# 1. When a player breaks a block with a telekinesis tool, the drops are calculated
# 2. Instead of dropping on the ground, items are added directly to the player's inventory
# 3. If the inventory is full, leftover items will drop on the ground normally
# 4. If "materials"/"nexo_ids" are set, only those blocks trigger Telekinesis
# 5. Combines perfectly with VeinMiner, Timber, BigMining, and other mining mechanics

# Benefits:
# - No need to pick up items from the ground
# - Prevents items from falling into lava or water
# - Whitelist prevents non-whitelisted blocks (e.g. Black Concrete next to Stone)
#   from accidentally landing in the inventory when using BigMining/VeinMiner
